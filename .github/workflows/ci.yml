name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format Check ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check verifactai/ --output-format=github

      - name: Ruff format check
        run: ruff format --check verifactai/

  # ── Security Scan ────────────────────────────
  security:
    name: Security
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Bandit scan (high severity only)
        run: bandit -r verifactai/core/ verifactai/utils/ -q -lll

  # ── Tests ────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: verifactai/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r verifactai/requirements.txt
          pip install pytest
          python -m spacy download en_core_web_sm

      - name: Syntax check (all Python modules)
        run: |
          find verifactai -name "*.py" -not -path "*/__pycache__/*" \
            -exec python -m py_compile {} +

      - name: Unit tests
        working-directory: verifactai
        run: python -m pytest tests/test_pipeline.py -v

      - name: Import verification
        working-directory: verifactai
        env:
          PYTHONPATH: .
        run: |
          python -c "
          from config import cfg, Profile, PROFILES
          from core.claim_decomposer import ClaimDecomposer, Claim
          from core.evidence_retriever import EvidenceRetriever
          from core.verdict_engine import VerdictEngine
          from core.annotator import AnnotatedOutputGenerator
          from core.pipeline import VeriFactPipeline
          from evaluation.metrics import binary_hallucination_metrics, expected_calibration_error
          print('All imports OK')
          "
