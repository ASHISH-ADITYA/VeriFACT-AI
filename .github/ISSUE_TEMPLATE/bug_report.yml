name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the issue
      placeholder: |
        1. Run `python smoke_test.py`
        2. Observe error on step X
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened instead?

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Ollama version, hardware
      placeholder: |
        - OS: macOS 15.x (Apple M4)
        - Python: 3.11.x
        - Ollama: 0.20.x
        - Model: llama3.1:8b

  - type: textarea
    id: logs
    attributes:
      label: Logs / Traceback
      description: Paste any error output
      render: shell
