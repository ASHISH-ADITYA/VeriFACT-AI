version: "3.9"

services:
  verifact-api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "verifactai/overlay_server.py"]
    env_file:
      - verifactai/.env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - VERIFACT_ENABLE_RISK_CLASSIFIER=1
      - VERIFACT_ENABLE_DISCRIMINATOR=1
      - VERIFACT_DISCRIMINATOR_PATH=/app/verifactai/assets/models/hallucination_discriminator.joblib
    ports:
      - "8765:8765"
    volumes:
      - ./verifactai/data/index:/app/verifactai/data/index:ro
      - ./verifactai/data/metadata:/app/verifactai/data/metadata:ro
      - ./verifactai/assets/models:/app/verifactai/assets/models
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  verifact-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "streamlit",
        "run",
        "verifactai/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
        "--server.headless=true",
        "--browser.gatherUsageStats=false"
      ]
    env_file:
      - verifactai/.env
    environment:
      - LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "8501:8501"
    volumes:
      - ./verifactai/data/index:/app/verifactai/data/index:ro
      - ./verifactai/data/metadata:/app/verifactai/data/metadata:ro
    depends_on:
      verifact-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
